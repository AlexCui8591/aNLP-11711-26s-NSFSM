# PSC Bridges-2 Configuration (vLLM backend)

# LLM Configuration
llm:
  model_name: "Qwen/Qwen2.5-7B-Instruct"
  backend: "vllm"
  api_base: "http://localhost:8000/v1"
  api_key: "not-needed"
  temperature: 0.3
  max_retries: 2

# Environment
env:
  max_steps_per_episode: 100
  num_runs: 15

# ReAct specific
react:
  max_steps_per_episode: 100

# Reflexion specific
reflexion:
  max_attempts: 3

# Logging
logging:
  save_trajectories: true
  verbose: false  # quiet on cluster, logs go to SLURM output
